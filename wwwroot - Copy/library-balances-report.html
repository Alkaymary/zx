<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>أرصدة المكتبات | AdminAPI</title>
  <style>
    :root{--bg:#fff;--panel:#fff;--sidebar:#fbfcfd;--ink:#16202a;--muted:#6f7a84;--line:#e7ebef;--brand:#0f766e;--accent:#c88b33;--danger:#bf4f45;--soft:#f5f8fa;--soft-brand:#eef7f6;--shadow:0 24px 60px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:"Cairo","Tajawal","Segoe UI",Tahoma,sans-serif}
    button,input,a{font:inherit}a{text-decoration:none;color:inherit}.app{display:grid;grid-template-columns:290px minmax(0,1fr);min-height:100vh}.sidebar{background:var(--sidebar);border-left:1px solid var(--line);padding:22px 18px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh}
    .brand{display:flex;align-items:center;gap:12px;padding:10px 6px}.brand-mark{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:#fff;font-weight:800;background:linear-gradient(135deg,var(--brand),var(--accent))}.brand strong{display:block;font-size:18px}.brand span{color:var(--muted);font-size:13px}.session-card,.topbar,.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.session-card{padding:16px}.session-card h3{margin:0 0 12px;font-size:16px}.session-line{display:flex;justify-content:space-between;gap:10px;padding:6px 0;color:var(--muted);font-size:13px}
    .nav{display:grid;gap:8px;overflow:auto;padding-left:4px}.nav-label{color:var(--muted);font-size:12px;font-weight:800;padding:6px 10px 2px}.nav-btn{width:100%;min-height:46px;border:1px solid transparent;background:transparent;color:var(--ink);border-radius:16px;text-align:right;padding:0 14px;display:flex;align-items:center;font-weight:700}.nav-btn:hover{background:#fff;border-color:var(--line)}.nav-btn.active{background:var(--soft-brand);color:var(--brand)}.sidebar-actions{margin-top:auto;display:grid;gap:10px}.side-link,.side-btn{min-height:44px;border-radius:14px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--brand);font-weight:800;cursor:pointer}
    .main{padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;margin-bottom:18px}.topbar h1{margin:0;font-size:28px}.topbar p{margin:4px 0 0;color:var(--muted);font-size:14px}.top-btn{min-height:42px;padding:0 14px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--brand);cursor:pointer;font-weight:800}
    .panel{padding:20px}.search-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}.search-row input{flex:1;min-width:220px;min-height:48px;border-radius:16px;border:1px solid var(--line);padding:12px 14px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{padding:18px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,#fff 0%,#fbfcfd 100%)}.card h3{margin:0 0 8px;font-size:20px}.meta{color:var(--muted);font-size:14px;line-height:1.9}.pill{display:inline-flex;padding:7px 11px;border-radius:999px;background:var(--soft-brand);color:var(--brand);font-size:12px;font-weight:800;margin-top:12px}.empty,.error{padding:14px;border-radius:16px;line-height:1.8}.empty{background:var(--soft);color:var(--muted);display:none}.error{background:rgba(191,79,69,.08);border:1px solid rgba(191,79,69,.16);color:var(--danger);display:none}.show{display:block}
    @media (max-width:1180px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}}@media (max-width:980px){.grid{grid-template-columns:1fr 1fr}}@media (max-width:680px){.grid,.topbar{display:grid;grid-template-columns:1fr}}
  </style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
  <main class="app"><aside class="sidebar"><div class="brand"><div class="brand-mark">A</div><div><strong>لوحة المدير</strong><span>AdminAPI Control</span></div></div><section class="session-card"><h3>الجلسة الحالية</h3><div class="session-line"><span>اسم المستخدم</span><b id="sessionUsername">-</b></div><div class="session-line"><span>الدور</span><b id="sessionRole">-</b></div><div class="session-line"><span>المعرّف</span><b id="sessionUserId">-</b></div></section><nav class="nav"><div class="nav-label">صفحات التقارير</div><a class="nav-btn" href="/reports.html">الرئيسية</a><a class="nav-btn" href="/financial-summary-report.html">ملخص مالي عام</a><a class="nav-btn active" href="/library-balances-report.html">أرصدة المكتبات</a><a class="nav-btn" href="/all-payments.html">تقرير المدفوعات</a></nav><div class="sidebar-actions"><a class="side-link" href="/">صفحة الدخول</a><a class="side-link" href="/swagger">Swagger</a><button class="side-btn" id="logoutBtn" type="button">تسجيل الخروج</button></div></aside>
    <section class="main"><section class="topbar"><div><h1>أرصدة المكتبات</h1><p>تقرير لكل مكتبة يوضح المستحق والمدفوع والمتبقي.</p></div><button class="top-btn" id="refreshBtn" type="button">تحديث التقرير</button></section><section class="panel"><div class="search-row"><input id="searchInput" placeholder="ابحث باسم المكتبة أو الكود"></div><div class="error" id="errorBox"></div><div class="empty" id="emptyBox">لا توجد نتائج مطابقة حاليًا.</div><div class="grid" id="librariesGrid"></div></section></section></main>
  <script>
    const session=readJson("adminSession");let reportCache=[];function byId(id){return document.getElementById(id)} function readJson(key){try{return JSON.parse(localStorage.getItem(key)||"null")}catch{return null}} function requireSession(){if(!session?.accessToken){window.location.href="/";throw new Error("لا توجد جلسة مدير.")}} function renderSession(){byId("sessionUsername").textContent=session.username||"-";byId("sessionRole").textContent=session.roleCode||"-";byId("sessionUserId").textContent=session.userId||"-";} function showError(message){const box=byId("errorBox");box.textContent=message;box.classList.add("show")} function hideError(){const box=byId("errorBox");box.textContent="";box.classList.remove("show")}
    async function requestJson(url,options={}){const response=await fetch(url,{...options,headers:{"Content-Type":"application/json","Authorization":`Bearer ${session.accessToken}`,...(options.headers||{})}});const text=await response.text();let data=null;try{data=text?JSON.parse(text):null}catch{data=text}if(!response.ok){throw new Error(typeof data==="string"?data:(data?.title||data?.message||`HTTP ${response.status}`))}return data}
    function normalizeList(data){if(Array.isArray(data)) return data; if(Array.isArray(data?.value)) return data.value; return [];}
    function renderCards(items){byId("librariesGrid").innerHTML=items.map((item)=>`<article class="card"><h3>${item.libraryName}</h3><div class="meta">الكود: ${item.libraryCode}<br>إجمالي الرصيد: ${Number(item.totalBalance||0).toLocaleString("en-US")} د.ع<br>إجمالي المفتوح: ${Number(item.totalOpenInvoice||0).toLocaleString("en-US")} د.ع<br>إجمالي المدفوع: ${Number(item.totalPaid||0).toLocaleString("en-US")} د.ع<br>المتبقي: ${Number(item.totalDue||0).toLocaleString("en-US")} د.ع</div><span class="pill">${Number(item.totalDue||0)>0?"عليه متبقٍ":"مغلق"}</span></article>`).join("");byId("emptyBox").classList.toggle("show",items.length===0)}
    function applyFilter(){const search=byId("searchInput").value.trim().toLowerCase();const items=reportCache.filter((item)=>!search||[item.libraryName,item.libraryCode].some((x)=>String(x||"").toLowerCase().includes(search)));renderCards(items)}
    async function loadReport(){hideError();try{const libraries=normalizeList(await requestJson("/api/Libraries?limit=200"));const reports=await Promise.all(libraries.map(async (library)=>{const statement=await requestJson(`/api/FinancialTransactions/library/${library.id}/statement`).catch(()=>null);return statement?.summary||{libraryId:library.id,libraryCode:library.libraryCode,libraryName:library.libraryName,totalBalance:0,totalOpenInvoice:0,totalPaid:0,totalDue:0};}));reportCache=reports;applyFilter()}catch(error){showError(error.message||"تعذر تحميل تقرير المكتبات.")}}
    byId("searchInput").addEventListener("input",applyFilter);byId("refreshBtn").addEventListener("click",loadReport);byId("logoutBtn").addEventListener("click",()=>{localStorage.removeItem("adminSession");window.location.href="/";});requireSession();renderSession();loadReport();
  </script>
</body>
</html>
